<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeveWeave — Agent Overview</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --accent: #00ff88;
      --accent2: #00ccff;
      --text: #e0e0e0;
      --text-dim: #666;
      --text-mid: #999;
      --danger: #ff4444;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .repo-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .repo-name span { color: var(--text-dim); }

    .repo-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .repo-meta .badge {
      border: 1px solid var(--border);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
    }

    .repo-description {
      font-size: 0.85rem;
      color: var(--text-mid);
      max-width: 70ch;
    }

    .repo-link {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ── Tabs ── */
    .tabs-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.75rem 1.2rem;
      transition: all 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-count {
      background: var(--bg3);
      border-radius: 999px;
      font-size: 0.65rem;
      margin-left: 0.4rem;
      padding: 0.1rem 0.4rem;
      color: var(--text-mid);
    }

    /* ── Main content ── */
    main {
      padding: 2rem 2.5rem;
      max-width: 1200px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      padding: 1.25rem;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card:hover {
      background: var(--bg3);
      border-color: var(--accent);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-icon {
      color: var(--accent);
      font-size: 0.9rem;
    }

    .card-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent2);
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--text-mid);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
    }

    /* ── Skeletons ── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    .skeleton-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .skel-line { height: 12px; }
    .skel-line.w-60 { width: 60%; }
    .skel-line.w-100 { width: 100%; }
    .skel-line.w-80 { width: 80%; }

    /* ── Error / Notice ── */
    .notice {
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      padding: 1rem 1.25rem;
      color: var(--text-mid);
    }

    .notice.error { border-color: var(--danger); color: var(--danger); }
    .notice.warn { border-color: #ffaa00; color: #ffaa00; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 800px;
      width: 100%;
      margin: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }

    .modal-title {
      color: var(--accent);
      font-size: 1rem;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
      transition: all 0.15s;
    }

    .modal-close:hover { border-color: var(--accent); color: var(--accent); }

    .modal-body {
      padding: 1.5rem;
      overflow-x: auto;
    }

    /* ── Markdown render ── */
    .md-content { font-size: 0.85rem; line-height: 1.8; }
    .md-content h1, .md-content h2, .md-content h3 { color: var(--accent2); margin: 1.25rem 0 0.5rem; }
    .md-content h1 { font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .md-content h2 { font-size: 1rem; }
    .md-content h3 { font-size: 0.9rem; color: var(--accent); }
    .md-content p { margin: 0.5rem 0; color: var(--text); }
    .md-content ul, .md-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .md-content li { margin: 0.2rem 0; }
    .md-content code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.1rem 0.35rem;
    }
    .md-content pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin: 0.75rem 0;
      overflow-x: auto;
      padding: 1rem;
    }
    .md-content pre code {
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.78rem;
      padding: 0;
    }
    .md-content table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; }
    .md-content th, .md-content td {
      border: 1px solid var(--border);
      font-size: 0.78rem;
      padding: 0.4rem 0.75rem;
      text-align: left;
    }
    .md-content th { background: var(--bg3); color: var(--accent2); }
    .md-content blockquote {
      border-left: 3px solid var(--accent);
      color: var(--text-mid);
      margin: 0.75rem 0;
      padding: 0.25rem 0 0.25rem 1rem;
    }
    .md-content a { color: var(--accent2); }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.7rem;
      margin-top: 3rem;
      padding: 1rem 2.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @media (max-width: 640px) {
      header, main { padding: 1.25rem; }
      .tabs-bar { padding: 0 1.25rem; }
      footer { padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="repo-name" id="repo-name">
      <span>~/</span>PeveWeave <span class="cursor"></span>
    </div>
    <div class="repo-meta" id="repo-meta"></div>
  </div>
  <div class="repo-description" id="repo-description">carregando...</div>
  <div class="repo-link" id="repo-link"></div>
</header>

<nav class="tabs-bar">
  <button class="tab-btn active" data-tab="skills">
    Skills <span class="tab-count" id="count-skills">—</span>
  </button>
  <button class="tab-btn" data-tab="agents">
    Agents <span class="tab-count" id="count-agents">—</span>
  </button>
  <button class="tab-btn" data-tab="commands">
    Commands <span class="tab-count" id="count-commands">—</span>
  </button>
</nav>

<main>
  <section class="tab-panel active" id="tab-skills">
    <div class="cards-grid" id="grid-skills"></div>
  </section>
  <section class="tab-panel" id="tab-agents">
    <div class="cards-grid" id="grid-agents"></div>
  </section>
  <section class="tab-panel" id="tab-commands">
    <div class="cards-grid" id="grid-commands"></div>
  </section>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">✕ fechar</button>
    </div>
    <div class="modal-body">
      <div class="md-content" id="modal-content"></div>
    </div>
  </div>
</div>

<footer>
  <span>dados via GitHub API</span>
  <span>·</span>
  <span id="last-updated"></span>
  <span>·</span>
  <span>auto-atualizado a cada push no repo</span>
</footer>

<script>
const OWNER = 'paulovictor237';
const REPO  = 'PeveAgent';
const BASE  = `https://api.github.com/repos/${OWNER}/${REPO}`;
const BRANCH = 'main';
const RAW   = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}`;

const cache = {
  get: k => { try { return JSON.parse(sessionStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => { try { sessionStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

async function apiFetch(url) {
  const cached = cache.get(url);
  if (cached) return cached;
  const res = await fetch(url);
  if (res.status === 403) throw new Error('rate_limit');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  cache.set(url, data);
  return data;
}

function decodeBase64(b64) {
  return decodeURIComponent(
    atob(b64.replace(/\s/g, ''))
      .split('')
      .map(c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0'))
      .join('')
  );
}

function parseFrontmatter(raw) {
  const match = raw.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return { name: null, description: null, body: raw };
  try {
    const fm = jsyaml.load(match[1]);
    const body = raw.slice(match[0].length).trim();
    return { name: fm.name || null, description: fm.description || null, body };
  } catch {
    return { name: null, description: null, body: raw };
  }
}

function skeletonCards(n = 4) {
  return Array.from({ length: n }, () => `
    <div class="skeleton-card">
      <div class="skeleton skel-line w-60"></div>
      <div class="skeleton skel-line w-100"></div>
      <div class="skeleton skel-line w-80"></div>
    </div>
  `).join('');
}

function noticeHtml(msg, type = '') {
  return `<div class="notice ${type}">${msg}</div>`;
}

function cardHtml(item) {
  const icons = { skill: '⚡', agent: '🤖', command: '⌘' };
  const tags = item.tags?.map(t => `<span class="tag">${t}</span>`).join('') ?? '';
  return `
    <div class="card" data-path="${item.path}" data-title="${item.name}">
      <div class="card-header">
        <span class="card-icon">${icons[item.type] ?? '▸'}</span>
        <span class="card-name">${item.name}</span>
      </div>
      ${item.description ? `<p class="card-desc">${item.description}</p>` : ''}
      ${tags ? `<div class="card-footer">${tags}</div>` : ''}
    </div>
  `;
}

async function fetchMarkdown(path) {
  const cacheKey = `md:${path}`;
  const cached = cache.get(cacheKey);
  if (cached) return cached;
  const res = await fetch(`${RAW}/${path}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  cache.set(cacheKey, text);
  return text;
}

async function loadSection({ gridId, countId, apiPath, type, mdFileName }) {
  const grid = document.getElementById(gridId);
  const countEl = document.getElementById(countId);
  grid.innerHTML = skeletonCards();

  try {
    const entries = await apiFetch(`${BASE}/contents/${apiPath}`);
    const dirs = entries.filter(e => e.type === 'dir');

    if (dirs.length === 0) {
      grid.innerHTML = noticeHtml('Nenhum item encontrado.');
      countEl.textContent = '0';
      return;
    }

    const items = await Promise.all(
      dirs.map(async dir => {
        const mdPath = `${apiPath}/${dir.name}/${mdFileName}`;
        try {
          const raw = await fetchMarkdown(mdPath);
          const { name, description } = parseFrontmatter(raw);
          return { type, name: name || dir.name, description, path: mdPath };
        } catch {
          return { type, name: dir.name, description: null, path: mdPath };
        }
      })
    );

    countEl.textContent = items.length;
    grid.innerHTML = items.map(cardHtml).join('');
    grid.querySelectorAll('.card').forEach(card => card.addEventListener('click', onCardClick));
  } catch (err) {
    if (err.message === 'rate_limit') {
      grid.innerHTML = noticeHtml(
        '⚠️ GitHub API rate limit atingido (60 req/hr para não autenticados). Tente novamente em alguns minutos.',
        'warn'
      );
    } else {
      grid.innerHTML = noticeHtml(`Erro ao carregar: ${err.message}`, 'error');
    }
    countEl.textContent = '!';
  }
}

async function loadSingleFileSection({ gridId, countId, apiPath, type }) {
  const grid = document.getElementById(gridId);
  const countEl = document.getElementById(countId);
  grid.innerHTML = skeletonCards(2);

  try {
    const entries = await apiFetch(`${BASE}/contents/${apiPath}`);
    const files = entries.filter(e => e.type === 'file' && e.name.endsWith('.md'));

    if (files.length === 0) {
      grid.innerHTML = noticeHtml('Nenhum item encontrado.');
      countEl.textContent = '0';
      return;
    }

    const items = await Promise.all(
      files.map(async file => {
        try {
          const raw = await fetchMarkdown(`${apiPath}/${file.name}`);
          const { name, description } = parseFrontmatter(raw);
          return { type, name: name || file.name.replace('.md',''), description, path: `${apiPath}/${file.name}` };
        } catch {
          return { type, name: file.name.replace('.md',''), description: null, path: `${apiPath}/${file.name}` };
        }
      })
    );

    countEl.textContent = items.length;
    grid.innerHTML = items.map(cardHtml).join('');
    grid.querySelectorAll('.card').forEach(card => card.addEventListener('click', onCardClick));
  } catch (err) {
    if (err.message === 'rate_limit') {
      grid.innerHTML = noticeHtml('⚠️ Rate limit atingido. Tente em alguns minutos.', 'warn');
    } else {
      grid.innerHTML = noticeHtml(`Erro ao carregar: ${err.message}`, 'error');
    }
    countEl.textContent = '!';
  }
}

async function onCardClick(e) {
  const card = e.currentTarget;
  const path = card.dataset.path;
  const title = card.dataset.title;
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  const modalTitle = document.getElementById('modal-title');

  modalTitle.textContent = title;
  content.innerHTML = '<p style="color:var(--text-dim)">carregando...</p>';
  overlay.classList.add('open');

  try {
    const raw = await fetchMarkdown(path);
    const { body } = parseFrontmatter(raw);
    content.innerHTML = marked.parse(body);
  } catch (err) {
    content.innerHTML = noticeHtml(`Erro ao carregar markdown: ${err.message}`, 'error');
  }
}

async function loadRepoMeta() {
  try {
    const repo = await apiFetch(`${BASE}`);
    document.getElementById('repo-name').innerHTML =
      `<span>~/</span>${repo.name} <span class="cursor"></span>`;
    document.getElementById('repo-description').textContent =
      repo.description || 'Configuração pessoal do ambiente Claude Code.';
    document.getElementById('repo-link').innerHTML =
      `<a href="${repo.html_url}" target="_blank">${repo.html_url}</a>`;
    document.getElementById('repo-meta').innerHTML = `
      <span class="badge">★ ${repo.stargazers_count}</span>
      <span class="badge">${repo.default_branch}</span>
      <span class="badge">${repo.language || 'multi'}</span>
    `;
    document.getElementById('last-updated').textContent =
      `última atividade: ${new Date(repo.pushed_at).toLocaleDateString('pt-BR')}`;
    document.title = `${repo.name} — Agent Overview`;
  } catch {}
}

function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });
}

function initModal() {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-close').addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });
}

async function init() {
  initTabs();
  initModal();
  loadRepoMeta();

  await Promise.all([
    loadSection({
      gridId: 'grid-skills',
      countId: 'count-skills',
      apiPath: '.agent/skills',
      type: 'skill',
      mdFileName: 'SKILL.md'
    }),
    loadSection({
      gridId: 'grid-agents',
      countId: 'count-agents',
      apiPath: '.agent/agents',
      type: 'agent',
      mdFileName: null
    }).catch(() =>
      loadSingleFileSection({
        gridId: 'grid-agents',
        countId: 'count-agents',
        apiPath: '.agent/agents',
        type: 'agent'
      })
    ),
    loadSingleFileSection({
      gridId: 'grid-commands',
      countId: 'count-commands',
      apiPath: '.agent/commands',
      type: 'command'
    })
  ]);
}

init();
</script>
</body>
</html>
